name: Bot Scalping Final

on:
  schedule:
    - cron: '0 0 * * 1-5'    # 07:00 WIB (00:00 UTC)
    - cron: '45 8 * * 1-5'   # 15:45 WIB (08:45 UTC)
  workflow_dispatch:          # Untuk tes manual

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Library
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas-ta requests beautifulsoup4 lxml
      - name: Jalankan Bot
        run: python gorengan.py
# trigger update
