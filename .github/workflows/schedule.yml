name: Direct Masak - Scraper Otomatis

on:
  schedule:
    - cron: '0 0 * * 1-5'    # 07:00 WIB
    - cron: '45 8 * * 1-5'   # 15:45 WIB
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Library
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas-ta requests beautifulsoup4 lxml
      - name: Jalankan Bot Direct Masak
        run: python gorengan.py
